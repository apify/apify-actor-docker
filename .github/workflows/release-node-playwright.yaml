name: Node + Playwright images

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag for the images (e.g.: beta)"
        required: true
      apify_version:
        description: "Apify SDK version (e.g.: ^1.0.0). If missing, the latest version will be used."
        required: false
      crawlee_version:
        description: "Crawlee version (e.g.: ^1.0.0). If missing, the latest version will be used."
        required: false
      rebuild_images:
        description: "Rebuilds images even if the cache state matches the current state."
        required: false
        type: boolean
      trigger_templates_pr:
        description: "When set to true, always triggers the workflow on actor-templates."
        required: false
        type: boolean

  repository_dispatch:
    types:
      - build-node-images

  pull_request:
    paths:
      - "node-playwright/**"
      - "node-playwright-chrome/**"
      - "node-playwright-firefox/**"
      - "node-playwright-webkit/**"
      - "node-playwright-camoufox/**"
      - "certificates/**"
      - ".github/workflows/release-node-playwright.yaml"
      - ".github/actions/version-matrix/**"
      - ".github/scripts/prepare-node-image-tags.js"
      - "Makefile"

  schedule:
    - cron: 0 */2 * * *

env:
  RELEASE_TAG: ${{ github.event.inputs.release_tag || github.event.client_payload.release_tag }}
  APIFY_VERSION: ${{ github.event.inputs.apify_version || github.event.client_payload.apify_version }}
  CRAWLEE_VERSION: ${{ github.event.inputs.crawlee_version || github.event.client_payload.crawlee_version }}
  SHOULD_USE_LAST_FIVE: ${{ github.event_name != 'pull_request' }}
  SKIP_CACHE_CHECK: ${{ github.event_name == 'pull_request' || github.event.inputs.rebuild_images == 'true' }}

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .github/actions/version-matrix/package.json
          cache: yarn
          cache-dependency-path: .github/actions/version-matrix/yarn.lock

      - run: yarn
        working-directory: ./.github/actions/version-matrix

      - name: Generate matrix
        id: set-matrix
        run: echo "matrix=$(yarn node:playwright)" >> $GITHUB_OUTPUT
        working-directory: ./.github/actions/version-matrix

      - name: Print matrix
        run: |
          echo "Matrix:"
          echo '${{ steps.set-matrix.outputs.matrix }}' | jq -r '.include[] | "node-version=\(.["node-version"]) apify-version=\(.["apify-version"]) crawlee-version=\(.["crawlee-version"]) playwright-version=\(.["playwright-version"]) camoufox-version=\(.["camoufox-version"]) is-latest=\(.["is-latest"]) image-name=\(.["image-name"])"'
          echo ""
          echo "Raw matrix:"
          echo ""
          echo '${{ steps.set-matrix.outputs.matrix }}' | jq -e

      - name: Push updated matrix
        id: push-matrix
        if: github.event_name != 'pull_request'
        run: |
          # Setup git user
          git config --global user.email "noreply@apify.com"
          git config --global user.name "Apify CI Bot"
          git config pull.rebase true

          # Add and commit if there are changes
          git add ./.github/actions/version-matrix/data/*.json
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "chore(docker): update ${{ env.RELEASE_TAG || 'latest' }} node:playwright cache"
            echo "should-trigger=true" >> $GITHUB_OUTPUT
          fi

          # Try to push 5 times, with pulls between retries
          for i in {1..5}; do
            git push && break || echo "Failed to push, retrying in 5 seconds..." && sleep 5 && git pull
          done

      - name: Trigger workflow on actor-templates
        if: (steps.push-matrix.outputs.should-trigger == 'true' || github.event.inputs.trigger_templates_pr == 'true') && steps.set-matrix.outputs.latest-runtime-version != ''
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
          repository: apify/actor-templates
          event-type: update-templates
          client-payload: |-
            {
              "base_image": "apify/actor-node-playwright,apify/actor-node-playwright-chrome,apify/actor-node-playwright-firefox,apify/actor-node-playwright-webkit,apify/actor-node-playwright-camoufox",
              "module_version": "${{ steps.set-matrix.outputs.latest-module-version }}",
              "default_runtime_version": "${{ steps.set-matrix.outputs.latest-runtime-version }}"
            }

  # Build and test amd64 image, push to temp tag for multi-arch merge
  build-amd64:
    needs: [matrix]

    runs-on: ubuntu-latest
    if: ${{ toJson(fromJson(needs.matrix.outputs.matrix).include) != '[]' }}

    strategy:
      max-parallel: 20
      # By the time some build fails, other build can be already finished
      # so fail-fast does not really prevent the publishing of all parallel builds
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}

    name: "amd64 img: ${{ matrix.image-name }} node: ${{ matrix.node-version }}, pw: ${{ matrix.playwright-version }}"

    steps:
      - name: Set default inputs if event is pull request
        if: github.event_name == 'pull_request'
        run: |
          if [[ -z "$RELEASE_TAG" ]]; then echo "RELEASE_TAG=CI_TEST" >> $GITHUB_ENV; fi
          if [[ -z "$APIFY_VERSION" ]]; then echo "APIFY_VERSION=${{ matrix.apify-version }}" >> $GITHUB_ENV; fi
          if [[ -z "$CRAWLEE_VERSION" ]]; then echo "CRAWLEE_VERSION=${{ matrix.crawlee-version }}" >> $GITHUB_ENV; fi

      - name: Set default inputs if event is schedule
        if: github.event_name == 'schedule'
        run: |
          if [[ -z "$RELEASE_TAG" ]]; then echo "RELEASE_TAG=latest" >> $GITHUB_ENV; fi
          if [[ -z "$APIFY_VERSION" ]]; then echo "APIFY_VERSION=${{ matrix.apify-version }}" >> $GITHUB_ENV; fi
          if [[ -z "$CRAWLEE_VERSION" ]]; then echo "CRAWLEE_VERSION=${{ matrix.crawlee-version }}" >> $GITHUB_ENV; fi

      - name: Set default inputs if event is workflow_dispatch or repository_dispatch
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
        run: |
          if [[ -z "$APIFY_VERSION" ]]; then echo "APIFY_VERSION=${{ matrix.apify-version }}" >> $GITHUB_ENV; fi
          if [[ -z "$CRAWLEE_VERSION" ]]; then echo "CRAWLEE_VERSION=${{ matrix.crawlee-version }}" >> $GITHUB_ENV; fi

      - name: Check if inputs are set correctly
        run: |
          if [[ -z "$RELEASE_TAG" ]]; then echo "RELEASE_TAG input is empty!" >&2; exit 1; fi
          if [[ -z "$APIFY_VERSION" ]]; then echo "APIFY_VERSION input is empty!" >&2; exit 1; fi
          if [[ -z "$CRAWLEE_VERSION" ]]; then echo "CRAWLEE_VERSION input is empty!" >&2; exit 1; fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Copy Firefox certificates to image folder
        run: |
          if [ -f "./certificates/firefox-certificates.zip" ]; then
            mkdir -p ./${{ matrix.image-name }}/firefox-certs
            unzip -q -o ./certificates/firefox-certificates.zip -d ./${{ matrix.image-name }}/firefox-certs
            echo "Extracted $(ls -1 ./${{ matrix.image-name }}/firefox-certs/*.crt | wc -l) certificates"
          else
            mkdir -p ./${{ matrix.image-name }}/firefox-certs
            echo "No certificate archive found, created empty folder"
          fi

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Set Dependency Versions
        run: |
          cd ${{ matrix.image-name }}
          node ../.github/scripts/set-dependency-versions.js
        env:
          PLAYWRIGHT_VERSION: ${{ matrix.playwright-version }}
          CAMOUFOX_VERSION: ${{ matrix.camoufox-version }}

      - # It seems that it takes at least two minutes before a newly published version
        # becomes available in the NPM registry. We wait before starting the image builds.
        name: Wait For Package Registry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 2 # timeout for a single attempt
          max_attempts: 5
          retry_wait_seconds: 60 # wait between retries
          command: cd ${{ matrix.image-name }} && npm i --dry-run

      - name: Prepare image tags
        id: prepare-tags
        uses: actions/github-script@v8
        env:
          CURRENT_NODE: ${{ matrix.node-version }}
          LATEST_NODE: ${{ matrix.latest-node-version }}
          FRAMEWORK_VERSION: ${{ matrix.playwright-version }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          IMAGE_NAME: apify/actor-${{ matrix.image-name }}
          IS_LATEST_BROWSER_IMAGE: ${{ matrix.is-latest }}
        with:
          script: |
            const generateTags = require("./.github/scripts/prepare-node-image-tags.js");
            return generateTags();

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and tag image for testing
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.image-name }}
          file: ./${{ matrix.image-name }}/Dockerfile
          # PLAYWRIGHT_VERSION here is used for the full node-playwright image
          build-args: |
            NODE_VERSION=${{ matrix.node-version }}
            PLAYWRIGHT_VERSION=${{ format('v{0}-', matrix.playwright-version) }}
          platforms: linux/amd64
          provenance: false
          load: true
          tags: ${{ fromJson(steps.prepare-tags.outputs.result).allTags }}

      - name: Test image
        run: docker run ${{ fromJson(steps.prepare-tags.outputs.result).firstImageName }}

      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.APIFY_SERVICE_ACCOUNT_DOCKERHUB_USERNAME }}
          password: ${{ secrets.APIFY_SERVICE_ACCOUNT_DOCKERHUB_TOKEN }}

      - name: Push amd64 image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.image-name }}
          file: ./${{ matrix.image-name }}/Dockerfile
          build-args: |
            NODE_VERSION=${{ matrix.node-version }}
            PLAYWRIGHT_VERSION=${{ format('v{0}-', matrix.playwright-version) }}
          platforms: linux/amd64
          provenance: true
          push: true
          tags: "${{ fromJson(steps.prepare-tags.outputs.result).firstImageName }}-amd64"
          outputs: type=image,oci-mediatypes=true

  # Build arm64 image natively on ARM runner (avoids slow QEMU emulation)
  build-arm64:
    needs: [matrix]

    runs-on: ubuntu-24.04-arm
    if: ${{ github.event_name != 'pull_request' && toJson(fromJson(needs.matrix.outputs.matrix).include) != '[]' }}

    strategy:
      max-parallel: 20
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}

    name: "arm64 img: ${{ matrix.image-name }} node: ${{ matrix.node-version }}, pw: ${{ matrix.playwright-version }}"

    steps:
      - name: Set default inputs if event is schedule
        if: github.event_name == 'schedule' && matrix.supports-arm64 == 'true'
        run: |
          if [[ -z "$RELEASE_TAG" ]]; then echo "RELEASE_TAG=latest" >> $GITHUB_ENV; fi
          if [[ -z "$APIFY_VERSION" ]]; then echo "APIFY_VERSION=${{ matrix.apify-version }}" >> $GITHUB_ENV; fi
          if [[ -z "$CRAWLEE_VERSION" ]]; then echo "CRAWLEE_VERSION=${{ matrix.crawlee-version }}" >> $GITHUB_ENV; fi

      - name: Set default inputs if event is workflow_dispatch or repository_dispatch
        if: (github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch') && matrix.supports-arm64 == 'true'
        run: |
          if [[ -z "$APIFY_VERSION" ]]; then echo "APIFY_VERSION=${{ matrix.apify-version }}" >> $GITHUB_ENV; fi
          if [[ -z "$CRAWLEE_VERSION" ]]; then echo "CRAWLEE_VERSION=${{ matrix.crawlee-version }}" >> $GITHUB_ENV; fi

      - name: Checkout
        if: matrix.supports-arm64 == 'true'
        uses: actions/checkout@v6

      - name: Copy Firefox certificates to image folder
        if: matrix.supports-arm64 == 'true'
        run: |
          if [ -f "./certificates/firefox-certificates.zip" ]; then
            mkdir -p ./${{ matrix.image-name }}/firefox-certs
            unzip -q -o ./certificates/firefox-certificates.zip -d ./${{ matrix.image-name }}/firefox-certs
            echo "Extracted $(ls -1 ./${{ matrix.image-name }}/firefox-certs/*.crt | wc -l) certificates"
          else
            mkdir -p ./${{ matrix.image-name }}/firefox-certs
            echo "No certificate archive found, created empty folder"
          fi

      - name: Set up Node ${{ matrix.node-version }}
        if: matrix.supports-arm64 == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Set Dependency Versions
        if: matrix.supports-arm64 == 'true'
        run: |
          cd ${{ matrix.image-name }}
          node ../.github/scripts/set-dependency-versions.js
        env:
          PLAYWRIGHT_VERSION: ${{ matrix.playwright-version }}
          CAMOUFOX_VERSION: ${{ matrix.camoufox-version }}

      - name: Wait For Package Registry
        if: matrix.supports-arm64 == 'true'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 2
          max_attempts: 5
          retry_wait_seconds: 60
          command: cd ${{ matrix.image-name }} && npm i --dry-run

      - name: Prepare image tags
        if: matrix.supports-arm64 == 'true'
        id: prepare-tags
        uses: actions/github-script@v8
        env:
          CURRENT_NODE: ${{ matrix.node-version }}
          LATEST_NODE: ${{ matrix.latest-node-version }}
          FRAMEWORK_VERSION: ${{ matrix.playwright-version }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          IMAGE_NAME: apify/actor-${{ matrix.image-name }}
          IS_LATEST_BROWSER_IMAGE: ${{ matrix.is-latest }}
        with:
          script: |
            const generateTags = require("./.github/scripts/prepare-node-image-tags.js");
            return generateTags();

      - name: Set up Docker Buildx
        if: matrix.supports-arm64 == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        if: matrix.supports-arm64 == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.APIFY_SERVICE_ACCOUNT_DOCKERHUB_USERNAME }}
          password: ${{ secrets.APIFY_SERVICE_ACCOUNT_DOCKERHUB_TOKEN }}

      - name: Build and push arm64 image
        if: matrix.supports-arm64 == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.image-name }}
          file: ./${{ matrix.image-name }}/Dockerfile
          build-args: |
            NODE_VERSION=${{ matrix.node-version }}
            PLAYWRIGHT_VERSION=${{ format('v{0}-', matrix.playwright-version) }}
          platforms: linux/arm64
          provenance: true
          push: true
          tags: "${{ fromJson(steps.prepare-tags.outputs.result).firstImageName }}-arm64"
          outputs: type=image,oci-mediatypes=true

  # Merge amd64 and arm64 images into a single multi-arch manifest
  merge:
    needs: [matrix, build-amd64, build-arm64]

    runs-on: ubuntu-latest
    if: ${{ !cancelled() && github.event_name != 'pull_request' }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}

    name: "merge: apify/actor-${{ matrix.image-name }}:${{ matrix.node-version }}-${{ matrix.playwright-version }} (tag=${{ github.event.inputs.release_tag || github.event.client_payload.release_tag || 'latest' }})"

    steps:
      - name: Set default inputs if event is schedule
        if: github.event_name == 'schedule'
        run: |
          if [[ -z "$RELEASE_TAG" ]]; then echo "RELEASE_TAG=latest" >> $GITHUB_ENV; fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare image tags
        id: prepare-tags
        uses: actions/github-script@v8
        env:
          CURRENT_NODE: ${{ matrix.node-version }}
          LATEST_NODE: ${{ matrix.latest-node-version }}
          FRAMEWORK_VERSION: ${{ matrix.playwright-version }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          IMAGE_NAME: apify/actor-${{ matrix.image-name }}
          IS_LATEST_BROWSER_IMAGE: ${{ matrix.is-latest }}
        with:
          script: |
            const generateTags = require("./.github/scripts/prepare-node-image-tags.js");
            return generateTags();

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.APIFY_SERVICE_ACCOUNT_DOCKERHUB_USERNAME }}
          password: ${{ secrets.APIFY_SERVICE_ACCOUNT_DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          first_image="${{ fromJson(steps.prepare-tags.outputs.result).firstImageName }}"
          all_tags="${{ fromJson(steps.prepare-tags.outputs.result).allTags }}"

          tag_args=""
          IFS=',' read -ra TAGS <<< "$all_tags"
          for tag in "${TAGS[@]}"; do
            tag_args="$tag_args -t $tag"
          done

          if [ "${{ matrix.supports-arm64 }}" = "true" ]; then
            docker buildx imagetools create $tag_args \
              "${first_image}-amd64" \
              "${first_image}-arm64"
          else
            docker buildx imagetools create $tag_args \
              "${first_image}-amd64"
          fi
