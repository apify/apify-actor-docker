name: Node package caches

on:
  workflow_dispatch:

  repository_dispatch:
    types:
      - build-node-cache

  pull_request:
    paths:
      - ".github/actions/cache-builder/**"
      - ".github/workflows/cache-node.yaml"
      - ".github/workflows/build-node-package-caches.yaml"

  # Enable once we are happy with the trial.
  # schedule:
  #   - cron: 0 */2 * * *

jobs:
  # Standalone entry point for building (and inspecting) the package caches.
  # The actual logic lives in the reusable workflow so release builds can share it.
  caches:
    uses: ./.github/workflows/build-node-package-caches.yaml
